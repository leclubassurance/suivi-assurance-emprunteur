[build]
builder = "NIXPACKS"
# Frontend only (vite → dist/index.html). Ne pas lancer build:server ni node dist/server.cjs.
buildCommand = "npm install && npm run build"

[deploy]
# Doit correspondre à package.json "start" et scripts/railway-start.sh
startCommand = "NODE_ENV=production npx tsx server.ts"
restartPolicyType = "ON_FAILURE"
